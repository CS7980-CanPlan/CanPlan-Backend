# CanPlan 2.0 GraphQL schema.
#
# Backed by a single DynamoDB table (composite PK/SK). Default authorization is
# Cognito User Pool; the API key is a secondary mode for healthCheck + tooling.
# See docs/API.md for the human-readable companion and src/shared/keys.ts for the
# item-key conventions behind each operation.

# ─── Enums ────────────────────────────────────────────────────────────────────

enum UserRole {
  PRIMARY_USER
  SUPPORT_PERSON
  ORG_ADMIN
}

enum SupportLinkStatus {
  PENDING
  ACTIVE
  REVOKED
}

# Assignment lifecycle. Only TO_DO, COMPLETED, and SKIPPED are ever persisted.
# OVERDUE is a derived, read-only status: returned when a TO_DO assignment has a
# dueDate in the past. Clients must never send OVERDUE to a mutation.
enum AssignmentStatus {
  TO_DO
  OVERDUE
  COMPLETED
  SKIPPED
}

enum MediaType {
  IMAGE
  AUDIO
  VIDEO
}

# Unit a task schedule repeats on (repeatEvery × repeatUnit, e.g. every 2 WEEKs).
enum RepeatUnit {
  MINUTE
  HOUR
  DAY
  WEEK
  MONTH
}

# The mutually-exclusive base business role a SystemAdmin assigns. Values mirror UserRole;
# SystemAdmin is intentionally NOT here — it is an elevated group, not a base role.
enum AdminBaseRole {
  PRIMARY_USER
  SUPPORT_PERSON
  ORG_ADMIN
}

# ─── Domain types ───────────────────────────────────────────────────────────--

type UserProfile {
  userId: ID!
  role: UserRole!
  displayName: String
  email: String
  organizationId: ID
  accessibilitySettings: AWSJSON
  # Id of this user's mandatory default Category (a real Category row with isDefault:true),
  # created atomically with the profile. Tasks created without an explicit category fall
  # into it. Server-managed; never client-supplied.
  defaultCategoryId: ID
  # Nullable: the orgIndex roster projection (listUsersByOrganization) omits it.
  createdAt: String
  updatedAt: String
}

type SupportLink {
  supporterId: ID!
  primaryUserId: ID!
  # Mirror of primaryUserId — the supporterIndex sort key.
  userId: ID!
  status: SupportLinkStatus!
  permissions: AWSJSON
  createdAt: String!
  updatedAt: String
}

# A user-owned grouping for tasks (folder-like). PRIVATE to its owner: every category
# API derives the owner from the caller's Cognito identity, not a client-supplied id.
# Listed via listMyCategories. Every user has exactly one default category named
# "No Category" (isDefault:true) created with their profile — it cannot be renamed or
# deleted, and a Task with no explicit category is filed under it.
type Category {
  categoryId: ID!
  ownerId: ID!
  name: String!
  color: String
  sortOrder: Int
  # True only for the reserved default ("No Category") row. Server-controlled — clients
  # use it to identify the default reliably; it is never accepted as input.
  isDefault: Boolean!
  createdAt: String!
  updatedAt: String!
}

# Recurring-schedule metadata stored on a Task. Phase 1 persists this only — reminder
# delivery (EventBridge / push) is not implemented yet.
type TaskSchedule {
  repeatEvery: Int!
  repeatUnit: RepeatUnit!
  firstOccurrenceAt: String!
  timezone: String!
  enabled: Boolean
}

type Task {
  taskId: ID!
  ownerId: ID!
  title: String!
  # The real Category this task belongs to. Always set — a task created without an
  # explicit category is filed under its owner's default category.
  categoryId: ID!
  # Owner-defined display position across ALL of the owner's tasks (per-owner, not
  # per-category). Assigned at creation (appended after the current last task) and changed
  # in bulk via updateTaskOrder; listTasksByOwner returns tasks sorted by it. Gaps are
  # allowed — deleting a task never renumbers the rest.
  order: Int
  description: String
  scheduleRule: String
  # Recurring-schedule metadata; null unless the task was created with a schedule.
  schedule: TaskSchedule
  # First/next fire time — equals schedule.firstOccurrenceAt at creation.
  nextOccurrenceAt: String
  # Whether reminders are enabled; defaults to true when a schedule is provided.
  notificationEnabled: Boolean
  # Optional single cover image — the id of an IMAGE MediaAsset under this task. Null
  # when the task has no cover. Fetch a viewable URL via getMediaDownloadUrl(taskId,
  # coverImageAssetId); no cover URL is exposed directly on the Task.
  coverImageAssetId: ID
  createdAt: String!
  updatedAt: String
  # Populated by createTask with the steps it just wrote; use listTaskSteps otherwise.
  steps: [TaskStep!]
}

type TaskStep {
  stepId: ID!
  taskId: ID!
  order: Int!
  text: String!
  # Optional longer description, separate from `text` and from Task.description.
  description: String
  # At most one asset of each MediaType (IMAGE, AUDIO, VIDEO). Set/replace/remove an
  # individual type via updateTaskStep(media); fetch each binary with getMediaDownloadUrl.
  mediaAssets: [MediaAsset!]!
  createdAt: String!
  updatedAt: String
}

type Assignment {
  assignmentId: ID!
  taskId: ID!
  userId: ID!
  assignedBy: ID
  dueDate: String
  recurrence: String
  scheduleRule: String
  # Derived OVERDUE when persisted TO_DO + dueDate in the past; otherwise the persisted value.
  status: AssignmentStatus!
  assignedAt: String!
  createdAt: String!
  updatedAt: String
}

# A snapshot of one TaskStep captured into one Assignment at creation. Immutable to
# later template edits, so historical assignments keep the step content as assigned.
# NOTE: carries text/completion only — NOT media. A live Task MediaAsset may be deleted
# with its TaskStep, so it is never copied here as an assignment-media snapshot. (If
# assignment-visible media is needed later, it must be a separate, assignment-owned copy.)
type AssignmentStep {
  assignmentId: ID!
  taskId: ID!
  stepId: ID!
  order: Int!
  text: String!
  completed: Boolean!
  completedAt: String
  createdAt: String!
  updatedAt: String!
}

type MediaAsset {
  assetId: ID!
  taskId: ID!
  # Ownership marker for step media. A step may own one asset per MediaType. Null when this
  # asset is a Task cover image or temporarily unattached. Never set for cover images.
  stepId: ID
  s3Key: String!
  type: MediaType!
  mimeType: String!
  ownerId: ID!
  size: Int
  createdAt: String!
  updatedAt: String
}

type Report {
  reportId: ID!
  scope: AWSJSON
  dateRange: AWSJSON
  s3Key: String
  createdBy: ID
  createdAt: String!
}

# Presigned S3 upload target returned by createMediaUploadUrl. The client PUTs the
# file bytes to `uploadUrl`, then registers it via createMediaAsset with `s3Key`.
type MediaUploadTarget {
  uploadUrl: String!
  s3Key: String!
  expiresIn: Int!
}

# Short-lived presigned GET URL for a private media object (getMediaDownloadUrl).
type MediaDownloadTarget {
  downloadUrl: String!
  s3Key: String!
  expiresIn: Int!
}

# ─── Admin (SystemAdmin-only) ───────────────────────────────────────────────--

# Result of an admin user mutation: the user's id (Cognito sub), email, current Cognito
# groups (the source of truth for authorization), and their UserProfile if one exists.
type AdminUserResult {
  userId: ID!
  email: AWSEmail
  groups: [String!]!
  profile: UserProfile
}

# Tally returned by adminDeleteUser describing what was removed.
type AdminDeleteUserResult {
  userId: ID!
  deletedTasks: Int!
  deletedUserItems: Int!
  deletedSupportLinks: Int!
  deletedCognitoUser: Boolean!
}

# Full read-only snapshot of everything one user owns (SystemAdmin user-detail view):
# their profile, owned tasks, categories, assignments, and support links (either direction).
type AdminUserData {
  userId: ID!
  profile: UserProfile
  tasks: [Task!]!
  categories: [Category!]!
  assignments: [Assignment!]!
  supportLinks: [SupportLink!]!
}

# ─── AI step generation (Bedrock KB + RAG) ──────────────────────────────────--

type Citation {
  chunkId: String!
  title: String!
  url: String
  snippet: String
}

# An AI-generated, source-cited step — distinct from the persisted TaskStep entity.
type GeneratedStep {
  text: String!
  citations: [Citation!]!
}

type TaskStepsResponse {
  steps: [GeneratedStep!]!
  model: String!
  inputTokens: Int
  outputTokens: Int
}

# An AI-generated task PREVIEW — a clean title + ordered, text-only steps. Nothing is
# persisted: the caller decides whether to keep it and saves it later via createTask.
# Citations are intentionally dropped (end users have cognitive disabilities).
type GeneratedAiTaskStep {
  text: String!
}

type GeneratedAiTask {
  title: String!
  steps: [GeneratedAiTaskStep!]!
  inputTokens: Int
  outputTokens: Int
}

# ─── Inputs ───────────────────────────────────────────────────────────────────

# A signed-in user creates only their OWN profile. Identity (userId), email, and
# role are derived server-side from the Cognito session — never client-supplied —
# so this input carries only user-editable fields. Cognito group membership is the
# source of truth for role; UserProfile.role is a server-derived projection of it.
input CreateMyUserProfileInput {
  displayName: String!
  organizationId: ID
  accessibilitySettings: AWSJSON
}

# Partial update of the signed-in caller's OWN profile. The owner is derived from the
# Cognito identity — there is no userId. Only displayName and accessibilitySettings may be
# changed here; userId, email, role, organizationId, defaultCategoryId, and timestamps are
# not editable. Supply at least one field. displayName: omitted ⇒ unchanged; otherwise
# trimmed and may not be empty/whitespace. accessibilitySettings: omitted ⇒ unchanged;
# explicit null ⇒ cleared; a value ⇒ FULL replacement of the stored settings (never merged).
input UpdateMyUserProfileInput {
  displayName: String
  accessibilitySettings: AWSJSON
}

input CreateSupportLinkInput {
  supporterId: ID!
  primaryUserId: ID!
  status: SupportLinkStatus
  permissions: AWSJSON
}

# Create one of the caller's own categories. The owner is derived from the Cognito
# identity — there is no ownerId. `name` may not be the reserved "No Category".
input CreateCategoryInput {
  name: String!
  color: String
  sortOrder: Int
}

# Partial edit of one of the caller's own categories — at least one of name/color/
# sortOrder is required. The default category's name cannot be changed (color/sortOrder
# are allowed); a normal category cannot be renamed to the reserved "No Category".
input UpdateCategoryInput {
  categoryId: ID!
  name: String
  color: String
  sortOrder: Int
}

# Identifies one of the caller's own categories to delete. The default cannot be deleted.
input DeleteCategoryInput {
  categoryId: ID!
}

# Schedule metadata accepted at task creation. `enabled` defaults to true when stored.
input TaskScheduleInput {
  repeatEvery: Int!
  repeatUnit: RepeatUnit!
  firstOccurrenceAt: String!
  timezone: String!
  enabled: Boolean
}

# The owner is derived from the Cognito identity — there is no ownerId.
input CreateTaskInput {
  title: String!
  # Optional. Omitted/null ⇒ the owner's default category. A blank string is rejected; a
  # supplied id must be a real, owned, non-deleting Category.
  categoryId: ID
  description: String
  scheduleRule: String
  steps: [CreateTaskStepNestedInput!]
  # Optional recurring schedule (stored only in phase 1; no delivery yet).
  schedule: TaskScheduleInput
  # Optional; defaults to true when a schedule is provided, otherwise left unset.
  notificationEnabled: Boolean
  # Optional cover image: the pending s3Key from createTaskCoverImageUploadUrl (after
  # the client PUT the bytes). Omitted ⇒ the task has no cover image.
  coverImageS3Key: String
}

# AI one-shot task creation: the user gives one request; the AI generates a clean
# title + steps and the task is created directly. No citations are surfaced or
# stored (end users have cognitive disabilities). Owner is derived from the
# Cognito identity.
input CreateAiTaskInput {
  query: String!          # the user's request, e.g. "wash my hair"; drives generation + title
  categoryId: ID          # optional, as in createTask: omitted ⇒ owner's default category
}

# Partial edit of an existing task. Only fields you include are changed; omitted
# fields keep their current value. `ownerId` and the task's steps are not editable
# here (steps have their own createTaskStep). Errors if the task doesn't exist.
input UpdateTaskInput {
  taskId: ID!
  title: String
  # Omitted ⇒ unchanged. A blank string is rejected; a supplied id must be a real, owned,
  # non-deleting Category belonging to the task's owner.
  categoryId: ID
  description: String
  scheduleRule: String
  schedule: TaskScheduleInput
  notificationEnabled: Boolean
  # Optional new cover image: the pending s3Key from createTaskCoverImageUploadUrl.
  # Supplied ⇒ replace the cover (old asset/binary cleaned up after the new one is
  # registered); omitted ⇒ leave the current cover image unchanged.
  coverImageS3Key: String
}

# Nested step at task creation — text (+ optional description). The task and step ids
# don't exist yet, so media is attached afterward (createMediaUploadUrl →
# createMediaAsset → updateTaskStep).
input CreateTaskStepNestedInput {
  text: String!
  # Optional longer description, separate from `text`. Trimmed when stored.
  description: String
}

input CreateTaskStepInput {
  taskId: ID!
  order: Int!
  text: String!
  # Optional longer description, separate from `text`. Trimmed when stored.
  description: String
  # Optional initial media slots. Each entry requires a non-null assetId; types must be unique.
  media: [SetTaskStepMediaInput!]
}

# Set one media-type slot on a TaskStep. An assetId attaches a currently-unattached asset of
# exactly this type, replacing and deleting the existing asset of the same type. Explicit
# null (or omitted) assetId removes the current asset of this type. Types may appear only
# once per update; omitted types are unchanged.
input SetTaskStepMediaInput {
  type: MediaType!
  assetId: ID
}

# Partial edit of one TaskStep, located by (taskId, stepId). Supply at least one of `text`,
# `description`, or `media`. `text` is trimmed and may not be empty. `description` semantics:
# omitted ⇒ unchanged; explicit null ⇒ clear; whitespace-only ⇒ rejected; otherwise trimmed
# and stored. `media` sets/replaces/removes one or more type-specific media slots. `stepId`,
# `taskId`, and `createdAt` are immutable (use reorderTaskSteps to change order).
input UpdateTaskStepInput {
  taskId: ID!
  stepId: ID!
  text: String
  description: String
  media: [SetTaskStepMediaInput!]
}

# One step's target position in a whole-task reorder.
input ReorderTaskStepInput {
  stepId: ID!
  order: Int!
}

# Atomically reorder ALL of a task's steps. `steps` must be the complete current set:
# every existing stepId exactly once, with orders forming a contiguous 1..N permutation
# (max 99 steps). Applied in one DynamoDB transaction (all-or-nothing); only the `order`
# attribute changes — step ids, media, task contents, and assignments are untouched.
input ReorderTaskStepsInput {
  taskId: ID!
  steps: [ReorderTaskStepInput!]!
}

# Identifies one TaskStep for deletion. Deleting it also deletes every media asset attached
# to the step (metadata rows + S3 objects), if any. Assets are never shared between steps or
# the cover. Assignments/AssignmentSteps are never touched.
input DeleteTaskStepInput {
  taskId: ID!
  stepId: ID!
}

# One task's target position in a whole-owner task reorder.
input TaskOrderInput {
  taskId: ID!
  order: Int!
}

# Reorder ALL of the caller's tasks at once. `tasks` must be the complete current set of the
# caller's tasks: every one of the owner's taskIds exactly once, with unique positive `order`
# values (gaps allowed — they need not be a contiguous 1..N run). Applied in one DynamoDB
# transaction (all-or-nothing); only each task's `order` attribute changes.
input UpdateTaskOrderInput {
  tasks: [TaskOrderInput!]!
}

# createAssignment always persists status TO_DO; status is not client-supplied.
input CreateAssignmentInput {
  taskId: ID!
  userId: ID!
  assignedBy: ID
  dueDate: String
  recurrence: String
  scheduleRule: String
}

# status accepts TO_DO, COMPLETED, or SKIPPED. OVERDUE is rejected (it is derived).
input UpdateAssignmentStatusInput {
  userId: ID!
  assignmentId: ID!
  status: AssignmentStatus!
}

input SetAssignmentStepCompletionInput {
  userId: ID!
  assignmentId: ID!
  stepId: ID!
  completed: Boolean!
}

# Identifies one Assignment for deletion by its composite key. Deleting it also
# removes every AssignmentStep snapshot under it; the source Task is untouched.
input DeleteAssignmentInput {
  userId: ID!
  assignmentId: ID!
}

# Register an uploaded object's metadata. The asset is created UNATTACHED — it is bound
# to a step only via updateTaskStep(media), or used as a cover via the cover flow.
input CreateMediaAssetInput {
  taskId: ID!
  s3Key: String!
  type: MediaType!
  mimeType: String!
  ownerId: ID!
  size: Int
}

input CreateMediaUploadUrlInput {
  taskId: ID!
  contentType: String!
  fileName: String
}

# Cover-image upload URL input. No taskId — a task may not exist yet at create time.
# contentType must be an image type (image/jpeg, image/png, image/webp); the server
# also re-verifies the uploaded object before registering it.
input CreateTaskCoverImageUploadUrlInput {
  contentType: String!
  fileName: String
}

# Identifies one MediaAsset to delete (its S3 binary + metadata row). It also clears a Task
# cover reference when applicable; Step media is discovered from MediaAsset.stepId at read time.
input DeleteMediaAssetInput {
  taskId: ID!
  assetId: ID!
}

# ─── Admin inputs (SystemAdmin-only) ─────────────────────────────────────────--

# Invite (or adopt an existing) Cognito user. No UserProfile is created — the app creates
# that via createUserProfile after the invitee first logs in. organizationId is reserved for
# future org assignment and is not persisted yet.
input InviteUserInput {
  email: AWSEmail!
  displayName: String
  organizationId: ID
}

# userId is the app-level id (the Cognito sub).
input SetUserBaseRoleInput {
  userId: ID!
  role: AdminBaseRole!
}

# userId is the app-level id (the Cognito sub). enabled=true grants SystemAdmin, false revokes.
input SetSystemAdminInput {
  userId: ID!
  enabled: Boolean!
}

# userId is the app-level id (the Cognito sub). deleteCognitoUser (default true) also removes
# the Cognito login after data cleanup; disableFirst (default true) disables it beforehand.
input AdminDeleteUserInput {
  userId: ID!
  deleteCognitoUser: Boolean = true
  disableFirst: Boolean = true
}

# AI step generation
input QueryContext {
  role: String
  organizationId: String
}

input GenerateTaskStepsInput {
  userId: String!
  query: String!
  context: QueryContext
}

# ─── Pagination / connections ───────────────────────────────────────────────--
# Every list query is paginated: pass an optional `limit` (page size) and the
# `nextToken` from the previous page. `nextToken` is an opaque, base64-encoded
# DynamoDB key; it is null when there are no more pages.

type UserProfileConnection {
  items: [UserProfile!]!
  nextToken: String
}

type SupportLinkConnection {
  items: [SupportLink!]!
  nextToken: String
}

type CategoryConnection {
  items: [Category!]!
  nextToken: String
}

type TaskConnection {
  items: [Task!]!
  nextToken: String
}

type TaskStepConnection {
  items: [TaskStep!]!
  nextToken: String
}

type AssignmentConnection {
  items: [Assignment!]!
  nextToken: String
}

type AssignmentStepConnection {
  items: [AssignmentStep!]!
  nextToken: String
}

type MediaAssetConnection {
  items: [MediaAsset!]!
  nextToken: String
}

# ─── Operations ─────────────────────────────────────────────────────────────--

type Query {
  # Liveness probe — reachable with the API key (monitors/CI) OR a Cognito JWT.
  # Every other field uses the API's default Cognito User Pool auth.
  healthCheck: String! @aws_api_key @aws_cognito_user_pools

  getUserProfile(userId: ID!): UserProfile
  listUsersByOrganization(organizationId: ID!, limit: Int, nextToken: String): UserProfileConnection!
  listPrimaryUsersBySupporter(supporterId: ID!, limit: Int, nextToken: String): SupportLinkConnection!

  # The authenticated caller's own categories (owner derived from the Cognito identity).
  listMyCategories(limit: Int, nextToken: String): CategoryConnection!

  getTask(taskId: ID!): Task
  # A task's steps, sorted by ascending numeric `order`.
  listTaskSteps(taskId: ID!, limit: Int, nextToken: String): TaskStepConnection!
  listTasksByOwner(ownerId: ID!, limit: Int, nextToken: String): TaskConnection!
  # Tasks in one of an owner's real categories. categoryId is required.
  listTasksByCategory(ownerId: ID!, categoryId: ID!, limit: Int, nextToken: String): TaskConnection!

  listAssignmentsForUser(userId: ID!, limit: Int, nextToken: String): AssignmentConnection!
  # One assignment's step snapshots, sorted by `order`.
  listAssignmentSteps(userId: ID!, assignmentId: ID!, limit: Int, nextToken: String): AssignmentStepConnection!
  getMediaDownloadUrl(taskId: ID!, assetId: ID!): MediaDownloadTarget
  listMediaForTask(taskId: ID!, limit: Int, nextToken: String): MediaAssetConnection!

  # SystemAdmin-only admin/debug listings — query entityTypeIndex (no Scan),
  # paginated. Gated to the SystemAdmin Cognito group at the edge; the resolver
  # re-checks the group as defense-in-depth.
  listAllUsers(limit: Int, nextToken: String): UserProfileConnection!
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmin"])
  listAllTasks(limit: Int, nextToken: String): TaskConnection!
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmin"])
  # Full read-only snapshot of one user's data (profile, tasks, categories, assignments,
  # support links) for the admin user-detail view. PK queries + GSIs only (no Scan).
  adminGetUserData(userId: ID!): AdminUserData!
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmin"])
}

type Mutation {
  # Create the signed-in caller's own profile. userId, email, and role are taken
  # from the Cognito session (role derived from group membership), not the input.
  createUserProfile(input: CreateMyUserProfileInput!): UserProfile
  # Partial update of the caller's OWN profile (owner derived from the Cognito identity).
  # Only displayName and accessibilitySettings are editable; accessibilitySettings is a full
  # replacement, not a merge. Errors (NotFound) if the profile doesn't exist — it never
  # creates one. organizationId, role, email, etc. cannot be changed here.
  updateMyUserProfile(input: UpdateMyUserProfileInput!): UserProfile!
  createSupportLink(input: CreateSupportLinkInput!): SupportLink

  # Create one of the caller's own task categories (owner derived from identity).
  createCategory(input: CreateCategoryInput!): Category
  # Edit one of the caller's own categories (partial update). The default category's name
  # is immutable; normal categories cannot take the reserved "No Category" name.
  updateCategory(input: UpdateCategoryInput!): Category!
  # Delete one of the caller's own NON-default categories. Every task in it is first moved
  # to the owner's default category, then the category row is removed. Internally this may
  # run across multiple batches for large categories; it is safe to retry. Returns the
  # deleted category. The default category cannot be deleted.
  deleteCategory(input: DeleteCategoryInput!): Category!

  # Create a reusable task template (and optionally its ordered steps).
  createTask(input: CreateTaskInput!): Task
  # Generate a titled, stepped task PREVIEW from one request (no citations). Nothing is
  # persisted — the caller saves it later via createTask if they keep it.
  createAiTask(input: CreateAiTaskInput!): GeneratedAiTask!
  # Edit an existing task template's fields (partial update). Errors if not found.
  updateTask(input: UpdateTaskInput!): Task
  createTaskStep(input: CreateTaskStepInput!): TaskStep
  # Partial edit of one TaskStep: text, description, and/or type-specific media slots.
  # A step may have one IMAGE, one AUDIO, and one VIDEO asset. Errors if not found.
  updateTaskStep(input: UpdateTaskStepInput!): TaskStep
  # Delete one TaskStep and every attached media asset (metadata rows + S3 objects), if any.
  # Historical AssignmentSteps are unaffected. Returns the deleted TaskStep.
  deleteTaskStep(input: DeleteTaskStepInput!): TaskStep
  # Atomically reorder ALL of a task's steps (must supply the complete current set).
  # Returns the steps sorted by ascending order. Step ids, media, and assignments are
  # untouched.
  reorderTaskSteps(input: ReorderTaskStepsInput!): [TaskStep!]!
  # Reorder ALL of the caller's tasks at once (must supply the complete current set, each
  # with a unique position). Returns the tasks sorted by ascending order.
  updateTaskOrder(input: UpdateTaskOrderInput!): [Task!]!
  # Delete a task template and all of its TaskSteps. Historical Assignments and
  # AssignmentSteps snapshotted from it are NOT deleted. Returns the deleted Task.
  deleteTask(taskId: ID!): Task

  createAssignment(input: CreateAssignmentInput!): Assignment
  updateAssignmentStatus(input: UpdateAssignmentStatusInput!): Assignment
  # Toggle one assignment step's completion. Rejected on COMPLETED/SKIPPED assignments.
  setAssignmentStepCompletion(input: SetAssignmentStepCompletionInput!): AssignmentStep
  # Delete an assignment and all of its AssignmentStep snapshots. The source Task is
  # untouched. Returns the deleted Assignment.
  deleteAssignment(input: DeleteAssignmentInput!): Assignment

  # Mint a presigned S3 upload URL; the client uploads the file, then calls
  # createMediaAsset with the returned s3Key to register the metadata.
  createMediaUploadUrl(input: CreateMediaUploadUrlInput!): MediaUploadTarget
  createMediaAsset(input: CreateMediaAssetInput!): MediaAsset
  # Mint a presigned PUT URL + temporary pending s3Key for a task cover image. Reject
  # non-image content types. Pass the returned s3Key as coverImageS3Key to createTask/
  # updateTask, which verifies and promotes the upload to a task-owned MediaAsset.
  createTaskCoverImageUploadUrl(input: CreateTaskCoverImageUploadUrlInput!): MediaUploadTarget!
  # Delete one MediaAsset: its S3 binary and metadata row, plus a Task cover back-reference
  # when applicable. Step media is resolved through MediaAsset.stepId. Returns
  # the deleted asset; NotFound if it doesn't exist. Does not delete the Task or its steps.
  deleteMediaAsset(input: DeleteMediaAssetInput!): MediaAsset

  # Break a daily-living task into ordered, source-cited steps via Bedrock KB + RAG.
  generateTaskSteps(input: GenerateTaskStepsInput!): TaskStepsResponse!

  # ─── Admin mutations (SystemAdmin-only) ──────────────────────────────────────
  # All gated to the SystemAdmin Cognito group at the AppSync edge AND re-checked in the
  # admin Lambda. Cognito group membership stays the source of truth for authorization;
  # users may need to refresh/re-login after a group change to pick it up in a new JWT.

  # Invite a support person: create/adopt a Cognito user and add ONLY the SupportPerson
  # group (never PrimaryUser). Idempotent if the user already exists.
  inviteSupportPerson(input: InviteUserInput!): AdminUserResult!
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmin"])
  # Invite an organization admin: same as above but adds ONLY the OrganizationAdmin group.
  inviteOrganizationAdmin(input: InviteUserInput!): AdminUserResult!
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmin"])
  # Set a user's single base role: removes all base groups, adds the target one, mirrors the
  # role onto an existing UserProfile. SystemAdmin membership is unchanged.
  setUserBaseRole(input: SetUserBaseRoleInput!): AdminUserResult!
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmin"])
  # Grant/revoke the elevated SystemAdmin group (base roles untouched). Self-demotion rejected.
  setSystemAdmin(input: SetSystemAdminInput!): AdminUserResult!
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmin"])
  # Delete ANY task regardless of owner (same cascade as the owner deleteTask). Returns the
  # deleted Task, or null if it was already gone.
  adminDeleteTask(taskId: ID!): Task
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmin"])
  # Fully delete a user: owned tasks, their USER# partition rows, SupportLinks (both sides),
  # and the Cognito login (last). Deleting yourself is rejected.
  adminDeleteUser(input: AdminDeleteUserInput!): AdminDeleteUserResult!
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmin"])
}

