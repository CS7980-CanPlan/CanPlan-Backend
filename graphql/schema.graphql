type Task {
  taskId: ID!
  title: String!
  description: String
  createdAt: String!
}

input CreateTaskInput {
  title: String!
  description: String
}

type Mutation {
  createTask(input: CreateTaskInput!): Task!
}

type Query {
  # TODO: Add getTask, listTasks queries in a future milestone
  healthCheck: String!
}

schema {
  query: Query
  mutation: Mutation
}
