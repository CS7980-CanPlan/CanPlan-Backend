type Task {
  taskId: ID!
  title: String!
  description: String
  createdAt: String!
}

input CreateTaskInput {
  title: String!
  description: String
}

input AskAiInput {
  prompt: String!
}

type AiResponse {
  text: String!
  model: String!
  inputTokens: Int
  outputTokens: Int
}

type Mutation {
  createTask(input: CreateTaskInput!): Task!
  # Send user text to a Claude model on Amazon Bedrock and return its reply
  askAi(input: AskAiInput!): AiResponse!
}

type Query {
  # TODO: Add getTask, listTasks queries in a future milestone
  healthCheck: String!
}

schema {
  query: Query
  mutation: Mutation
}
