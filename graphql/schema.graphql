type Task {
  taskId: ID!
  title: String!
  description: String
  createdAt: String!
}

input CreateTaskInput {
  title: String!
  description: String
}

input QueryContext {
  role: String
  organizationId: String
}

input GenerateTaskStepsInput {
  userId: String!
  query: String!
  context: QueryContext
}

type Citation {
  chunkId: String!
  title: String!
  url: String
  snippet: String
}

type TaskStep {
  text: String!
  citations: [Citation!]!
}

type TaskStepsResponse {
  steps: [TaskStep!]!
  model: String!
  inputTokens: Int
  outputTokens: Int
}

type Mutation {
  createTask(input: CreateTaskInput!): Task!
  # Break a daily-living task into ordered, source-cited steps via Bedrock KB + RAG
  generateTaskSteps(input: GenerateTaskStepsInput!): TaskStepsResponse!
}

type Query {
  # TODO: Add getTask, listTasks queries in a future milestone
  healthCheck: String!
}

schema {
  query: Query
  mutation: Mutation
}
